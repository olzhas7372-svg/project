<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Market App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

header {
  background:#00a650;
  color:white;
  padding:15px;
  text-align:center;
}

.container {
  width:90%;
  margin:auto;
}

form input, form button {
  padding:10px;
  margin:5px;
}

.card {
  background:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
}

.chat {
  position:fixed;
  bottom:0;
  right:0;
  width:250px;
  background:white;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h2>🛒 Market App</h2>
</header>

<div class="container">

<h3>➕ Добавить объявление</h3>

<form method="POST" enctype="multipart/form-data">
<input name="title" placeholder="Название" required>
<input name="description" placeholder="Описание" required>

<input name="lat" placeholder="Широта">
<input name="lng" placeholder="Долгота">

<input type="file" name="image">

<button type="submit">Добавить</button>
</form>

<div id="map" style="height:300px;"></div>

<h3>📦 Объявления</h3>

<div class="grid">
{% for ad in ads %}
<div class="card">
<h4>{{ ad[1] }}</h4>
<p>{{ ad[2] }}</p>

{% if ad[5] %}
<img src="/static/uploads/{{ ad[5] }}" width="100%">
{% endif %}

</div>
{% endfor %}
</div>

</div>

<!-- CHAT -->
<div class="chat">
<ul id="messages"></ul>
<input id="msg">
<button onclick="sendMsg()">➤</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

<script>
var map = L.map('map').setView([43.23, 76.88], 12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

var ads = {{ ads|tojson }}

ads.forEach(ad => {
    if(ad[3] && ad[4]) {
        L.marker([ad[3], ad[4]]).addTo(map)
        .bindPopup(ad[1])
    }
})

// CHAT
var socket = io()

socket.on("message", function(msg){
    let li = document.createElement("li")
    li.innerText = msg
    document.getElementById("messages").appendChild(li)
})

function sendMsg(){
    let msg = document.getElementById("msg").value
    socket.send(msg)
}
</script>

</body>
</html>
